        let carrito = JSON.parse(localStorage.getItem('carrito_futbol')) || [];

        function renderProductos() {
            const grids = {
                tachos: document.getElementById('tachos-grid'),
                camisas: document.getElementById('camisas-grid'),
                guantes: document.getElementById('guantes-grid')
            };

            grids.tachos.innerHTML = '';
            grids.camisas.innerHTML = '';
            grids.guantes.innerHTML = '';

            productos.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img class="product-img" src="${prod.imagen}" alt="${prod.nombre}" loading="lazy">
                    <div class="product-info">
                        <h3 class="product-title">${prod.nombre}</h3>
                        <p class="product-desc">${prod.desc}</p>
                        <div class="product-footer">
                            <span class="product-price">$${prod.precio.toFixed(2)}</span>
                            <button class="btn-add" onclick="agregarAlCarrito(${prod.id})">Ver</button>
                        </div>
                    </div>
                `;
                grids[prod.categoria].appendChild(card);
            });
        }

        function agregarAlCarrito(id) {
            const productoSeleccionado = productos.find(p => p.id === id);
            const existe = carrito.find(item => item.id === id);
            
            if (existe) {
                existe.cantidad += 1;
            } else {
                carrito.push({ ...productoSeleccionado, cantidad: 1 });
            }
            actualizarCarrito();
        }

        function eliminarDelCarrito(id) {
            carrito = carrito.filter(item => item.id !== id);
            actualizarCarrito();
        }

        function actualizarCarrito() {
            localStorage.setItem('carrito_futbol', JSON.stringify(carrito));
            
            const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            document.getElementById('cart-count').innerText = totalItems;

            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            let precioTotal = 0;

            if (carrito.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#a0aec0;">El carrito está vacío.</p>';
            } else {
                carrito.forEach(item => {
                    precioTotal += item.precio * item.cantidad;
                    const itemRow = document.createElement('div');
                    itemRow.className = 'cart-item';
                    itemRow.innerHTML = `
                        <div>
                            <strong>${item.nombre}</strong> (x${item.cantidad})<br>
                            <span style="color: var(--accent-color); font-size:14px;">$${(item.precio * item.cantidad).toFixed(2)}</span>
                        </div>
                        <button class="btn-remove" onclick="eliminarDelCarrito(${item.id})">Quitar</button>
                    `;
                    container.appendChild(itemRow);
                });
            }
            document.getElementById('cart-total-price').innerText = precioTotal.toFixed(2);
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function procesarCompra() {
            if (carrito.length === 0) {
                alert("Tu carrito está vacío.");
                return;
            }
            alert("¡Compra procesada con éxito!");
            carrito = [];
            actualizarCarrito();
            toggleCart();
        }

        renderProductos();
        actualizarCarrito();
    </script>
